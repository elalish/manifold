# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  build_windows:
    name: Windows (TBB:${{matrix.parallelization}}, SHARED:${{matrix.shared}})
    timeout-minutes: 30
    strategy:
      matrix:
        parallelization: [OFF, ON]
        shared: [OFF, ON]
    runs-on: windows-2025
    steps:
    - uses: actions/checkout@v6
    - uses: lukka/get-cmake@v4.2.3
      with:
        cmakeVersion: 4.0.2
    - &clone-tbb
      uses: ./.github/actions/git-clone
      with:
        name: tbb
        url: https://github.com/oneapi-src/oneTBB.git
        tag: v2022.3.0
    - &clone-clipper2
      uses: ./.github/actions/git-clone
      with:
        name: clipper2
        url: https://github.com/AngusJohnson/Clipper2.git
        rev: 46f639177fe418f9689e8ddb74f08a870c71f5b4
    - &clone-nanobind
      uses: ./.github/actions/git-clone
      with:
        name: nanobind
        url: https://github.com/wjakob/nanobind.git
        tag: v2.12.0
    - &clone-gtest
      uses: ./.github/actions/git-clone
      with:
        name: gtest
        url: https://github.com/google/googletest.git
        tag: v1.17.0
    - uses: ilammy/msvc-dev-cmd@v1

    - name: Build ${{matrix.parallelization}}
      shell: bash
      run: |
        cmake . \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=${{matrix.shared}} \
          -DMANIFOLD_STRICT=ON \
          -DMANIFOLD_USE_BUILTIN_TBB=ON \
          -DMANIFOLD_DEBUG=ON \
          -DMANIFOLD_ASSERT=ON \
          -DMANIFOLD_PAR=${{matrix.parallelization}} \
          -DFETCHCONTENT_SOURCE_DIR_TBB=tbb \
          -DFETCHCONTENT_SOURCE_DIR_CLIPPER2=clipper2 \
          -DFETCHCONTENT_SOURCE_DIR_NANOBIND=nanobind \
          -DFETCHCONTENT_SOURCE_DIR_GOOGLETEST=gtest \
          -A x64 -B build
        cmake --build build --target ALL_BUILD --config Release
    - name: Test dll location
      if: matrix.shared == 'ON'
      shell: bash
      run: |
        ls ./build/lib/Release
        [ -f ./build/lib/Release/manifold.dll ]
        [ -f ./build/lib/Release/manifoldc.dll ]
    - name: Test
      shell: bash
      run: |
        cp ./build/lib/Release/* ./build/bin/Release
        ./build/bin/Release/manifold_test.exe
    - name: Export determinism meshes
      if: matrix.parallelization == 'OFF' && matrix.shared == 'OFF'
      shell: bash
      env:
        MANIFOLD_OBJ_HEX_FLOAT: 1
      run: |
        cp ./build/lib/Release/* ./build/bin/Release
        cd build/bin/Release
        ./manifold_test.exe -e --gtest_filter=Boolean.DeterminismSimpleSubtract:Boolean.DeterminismSimpleUnion:Boolean.DeterminismSimpleIntersect:Boolean.MultiCoplanar:Boolean.NonIntersecting:Boolean.AlmostCoplanar
        mkdir -p ../../../meshes-windows
        cp det_simple_subtract.obj det_simple_union.obj det_simple_intersect.obj det_multi_coplanar.obj det_non_overlap.obj det_nearly_coplanar.obj ../../../meshes-windows/
    - name: Upload determinism meshes (Windows)
      if: matrix.parallelization == 'OFF' && matrix.shared == 'OFF'
      uses: actions/upload-artifact@v4
      with:
        name: meshes-windows
        path: meshes-windows/
    - name: Export determinism discovery meshes (Windows)
      if: matrix.parallelization == 'OFF' && matrix.shared == 'OFF'
      shell: bash
      env:
        MANIFOLD_OBJ_HEX_FLOAT: 1
        MANIFOLD_BOOLEAN_DEBUG_DUMP: 1
        MANIFOLD_BOOLEAN_DEBUG_DUMP_DIR: ../../../boolean-dumps-perturb3-windows
      run: |
        cp ./build/lib/Release/* ./build/bin/Release
        cd build/bin/Release
        ./manifold_test.exe -e --gtest_filter=Boolean.Perturb3
        mkdir -p ../../../meshes-perturb3-windows
        cp perturb3_pair_union.obj perturb3_pair01.obj perturb3_pair23.obj perturb3_gear3_seq.obj perturb3_gear3_batch.obj perturb3_gear4_seq.obj perturb3_gear4_batch.obj perturb3_gear4_balanced_seq.obj perturb3_gear.obj perturb3_outerGear.obj perturb3_nastyGear.obj ../../../meshes-perturb3-windows/
    - name: Upload determinism discovery meshes (Windows)
      if: matrix.parallelization == 'OFF' && matrix.shared == 'OFF'
      uses: actions/upload-artifact@v4
      with:
        name: meshes-perturb3-windows
        path: meshes-perturb3-windows/
    - name: Upload determinism discovery debug dumps (Windows)
      if: matrix.parallelization == 'OFF' && matrix.shared == 'OFF'
      uses: actions/upload-artifact@v4
      with:
        name: boolean-dumps-perturb3-windows
        path: boolean-dumps-perturb3-windows/

  build:
    name: GCC ${{matrix.gcc}} (CrossSection:${{matrix.cross_section}}, TBB:${{matrix.parallelization}})
    timeout-minutes: 45
    strategy:
      matrix:
        cross_section: [ON]
        parallelization: [OFF, ON]
        os: [ubuntu-24.04]
        gcc: [13, 14]
        include:
          - cross_section: OFF
            parallelization: ON
            os: ubuntu-24.04
            gcc: 14
          - cross_section: ON
            parallelization: ON
            os: ubuntu-22.04
            gcc: 11
    runs-on: ${{ matrix.os }}
    env:
      CC: gcc-${{ matrix.gcc }}
      CXX: g++-${{ matrix.gcc }}
    steps:
    - uses: actions/checkout@v6
    - &setup-python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'
    - run: pip install -U trimesh pytest
    - name: Install apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        packages: libgtest-dev libassimp-dev git libtbb-dev pkg-config cmake
    - *clone-clipper2
    - *clone-nanobind

    - name: Build
      run: |
        cmake \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DBUILD_SHARED_LIBS=ON \
          -DMANIFOLD_STRICT=ON \
          -DMANIFOLD_PYBIND=ON \
          -DMANIFOLD_DEBUG=ON \
          -DMANIFOLD_ASSERT=ON \
          -DFETCHCONTENT_SOURCE_DIR_CLIPPER2=clipper2 \
          -DFETCHCONTENT_SOURCE_DIR_NANOBIND=nanobind \
          -DMANIFOLD_CROSS_SECTION=${{matrix.cross_section}} \
          -DASSIMP_ENABLE=ON \
          -DMANIFOLD_PAR=${{matrix.parallelization}} \
          . -B build
        cmake --build build
    - name: Test
      if: matrix.cross_section == 'ON'
      run: |
        ./build/test/manifold_test
        # python tests
        export PYTHONPATH=$PYTHONPATH:$(pwd)/build/bindings/python
        python3 bindings/python/examples/run_all.py -e
        python3 -m pytest
    - name: Export determinism meshes
      if: matrix.parallelization == 'OFF' && matrix.gcc == 14 && matrix.os == 'ubuntu-24.04'
      env:
        MANIFOLD_OBJ_HEX_FLOAT: 1
      run: |
        ./build/test/manifold_test -e --gtest_filter=Boolean.DeterminismSimpleSubtract:Boolean.DeterminismSimpleUnion:Boolean.DeterminismSimpleIntersect:Boolean.MultiCoplanar:Boolean.NonIntersecting:Boolean.AlmostCoplanar
        mkdir -p meshes-linux
        cp det_simple_subtract.obj det_simple_union.obj det_simple_intersect.obj det_multi_coplanar.obj det_non_overlap.obj det_nearly_coplanar.obj meshes-linux/
    - name: Upload determinism meshes (Linux)
      if: matrix.parallelization == 'OFF' && matrix.gcc == 14 && matrix.os == 'ubuntu-24.04'
      uses: actions/upload-artifact@v4
      with:
        name: meshes-linux
        path: meshes-linux/
    - name: Export determinism discovery meshes (Linux)
      if: matrix.parallelization == 'OFF' && matrix.gcc == 14 && matrix.os == 'ubuntu-24.04'
      env:
        MANIFOLD_OBJ_HEX_FLOAT: 1
        MANIFOLD_BOOLEAN_DEBUG_DUMP: 1
        MANIFOLD_BOOLEAN_DEBUG_DUMP_DIR: boolean-dumps-perturb3-linux
      run: |
        ./build/test/manifold_test -e --gtest_filter=Boolean.Perturb3
        mkdir -p meshes-perturb3-linux
        cp perturb3_pair_union.obj perturb3_pair01.obj perturb3_pair23.obj perturb3_gear3_seq.obj perturb3_gear3_batch.obj perturb3_gear4_seq.obj perturb3_gear4_batch.obj perturb3_gear4_balanced_seq.obj perturb3_gear.obj perturb3_outerGear.obj perturb3_nastyGear.obj meshes-perturb3-linux/
    - name: Upload determinism discovery meshes (Linux)
      if: matrix.parallelization == 'OFF' && matrix.gcc == 14 && matrix.os == 'ubuntu-24.04'
      uses: actions/upload-artifact@v4
      with:
        name: meshes-perturb3-linux
        path: meshes-perturb3-linux/
    - name: Upload determinism discovery debug dumps (Linux)
      if: matrix.parallelization == 'OFF' && matrix.gcc == 14 && matrix.os == 'ubuntu-24.04'
      uses: actions/upload-artifact@v4
      with:
        name: boolean-dumps-perturb3-linux
        path: boolean-dumps-perturb3-linux/
    - name: test cmake consumer
      run: |
        sudo cmake --install build
        ./scripts/test-cmake.sh

  build_gcc_codecov:
    name: code coverage
    timeout-minutes: 45
    strategy:
      matrix:
        # parallelization: [OFF, ON]
        parallelization: [OFF]
    env:
      CC: gcc-14
      CXX: g++-14
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Install apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        packages: libgtest-dev git libtbb-dev pkg-config lcov cmake
    - *clone-clipper2
    - name: build clipper2
      run: |
        cd clipper2/CPP
        cmake -DCMAKE_BUILD_TYPE=Release . -B build
        cmake --build build
        sudo cmake --install build

    - name: build
      run: |
        cmake \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DBUILD_SHARED_LIBS=ON \
          -DMANIFOLD_STRICT=ON \
          -DMANIFOLD_PYBIND=OFF \
          -DMANIFOLD_DEBUG=ON \
          -DMANIFOLD_ASSERT=ON \
          -DMANIFOLD_CROSS_SECTION=ON \
          -DMANIFOLD_PAR=${{matrix.parallelization}} \
          -DCODE_COVERAGE=ON \
          . -B build
        cmake --build build
    - name: Coverage Report
      run: |
        cd build
        lcov --capture --gcov-tool gcov-14 --ignore-errors mismatch --initial --directory . --output-file ./code_coverage_init.info
        test/manifold_test
        lcov --capture --gcov-tool gcov-14 --ignore-errors mismatch --directory . --output-file ./code_coverage_test.info
        lcov --add-tracefile ./code_coverage_init.info --add-tracefile ./code_coverage_test.info --output-file ./code_coverage_total.info
        lcov --extract ./code_coverage_total.info "/*/manifold/src/*" --output-file ./code_coverage.info
    - uses: codecov/codecov-action@v5
      with:
        disable_search: true
        files: build/code_coverage.info
        fail_ci_if_error: false
        name: ${{matrix.parallelization}}
        token: ${{secrets.CODECOV_TOKEN}}
        verbose: true

  build_wasm:
    name: WASM (TBB:${{matrix.parallelization}}, DEBUG:${{matrix.debug}})
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        parallelization: [OFF, ON]
        debug: [OFF, ON]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 25
        cache: 'npm'
        cache-dependency-path: bindings/**/package-lock.json
    - name: Install apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        packages: cmake
        version: 1
    - name: Setup EMSDK
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 5.0.2
    - *clone-tbb
    - *clone-clipper2
    - *clone-gtest
    - name: Build WASM ${{matrix.parallelization}}
      run: |
        emcmake cmake \
          -DCMAKE_BUILD_TYPE=MinSizeRel \
          -DMANIFOLD_STRICT=ON \
          -DMANIFOLD_PAR=${{matrix.parallelization}} \
          -DMANIFOLD_USE_BUILTIN_TBB=ON \
          -DMANIFOLD_DEBUG=${{matrix.debug}} \
          -DMANIFOLD_ASSERT=${{matrix.debug}} \
          -DFETCHCONTENT_SOURCE_DIR_TBB=tbb \
          -DFETCHCONTENT_SOURCE_DIR_CLIPPER2=clipper2 \
          -DFETCHCONTENT_SOURCE_DIR_GOOGLETEST=gtest \
          . -B build
        cd build
        emmake make
    - name: Test WASM
      if: matrix.parallelization == 'OFF'
      run: |
        cd build/test
        node ./manifold_test.js
    - name: Run unit tests
      if: matrix.parallelization == 'OFF'
      run: |
        cd bindings/wasm
        npm ci
        npm run build
        npm test
    - name: Isolated npm smoke test
      if: matrix.parallelization == 'OFF'
      run: |
        set -ev -o pipefail
        cd bindings/wasm
        wasmpath=$(pwd)
        npmtestpath=../npmtest
        # Create an npm package.
        npm ci && npm pack
        # Install it in an empty directory.
        mkdir -p ${npmtestpath} && cd ${npmtestpath}
        npm install ${wasmpath}/manifold-3d*.tgz
        cp ${wasmpath}/test/fixtures/npm/* .
        # Positive case smoke test.
        npx manifold-cad ./unitSphere.mjs ./unitSphere.glb && echo "Positive smoke test succeeded"
        # Negative case smoke test.
        npx manifold-cad ./unitSphereNoManifoldImport.mjs ./unitSphereNoManifoldImport.glb || echo "Negative smoke test failed as expected"
    - name: Build manifoldCAD editor
      if: matrix.parallelization == 'OFF'
      run: |
        cd bindings/wasm
        npm run ci:editor
        npm run build:editor
    - name: Build WASM examples
      if: matrix.parallelization == 'OFF'
      run: |
        cd bindings/wasm/examples
        npm run ci:examples
        npm run build:examples
    - name: Build WASM documentation and site
      if: matrix.parallelization == 'OFF'
      run: |
        cd bindings/wasm
        npm run docs
        npm run public
    - name: Upload manifoldCAD editor, examples and documentation
      uses: actions/upload-artifact@v4
      if: github.event_name == 'push' && matrix.parallelization == 'OFF' && matrix.debug == 'OFF'
      with:
        name: wasmpublic
        path: bindings/wasm/public/
        retention-days: 90
        overwrite: true
    - name: Upload complete wasm build.
      uses: actions/upload-artifact@v4
      if: github.event_name == 'push' && matrix.parallelization == 'OFF' && matrix.debug == 'OFF'
      with:
        name: wasm
        path: bindings/wasm/
        retention-days: 90
        overwrite: true

  build_fuzzer:
    name: fuzzer
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]
    runs-on: ${{matrix.os}}
    steps:
    - uses: actions/checkout@v6
    - name: Install apt packages
      if: matrix.os == 'ubuntu-24.04'
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        packages: libgtest-dev clang cmake
        version: 1
    - name: Install brew packages
      if: matrix.os == 'macos-latest'
      run: |
        brew install googletest cmake
    - *clone-clipper2
    - uses: ./.github/actions/git-clone
      with:
        name: fuzztest
        url: https://github.com/google/fuzztest.git
        rev: f1e26613f66997aa09d3026762e275de22b2daae
    - name: Build
      run: |
        cmake \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DMANIFOLD_STRICT=ON \
          -DMANIFOLD_DEBUG=ON \
          -DMANIFOLD_FUZZ=ON \
          -DMANIFOLD_PYBIND=OFF \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DMANIFOLD_CROSS_SECTION=ON \
          -DFETCHCONTENT_SOURCE_DIR_CLIPPER2=clipper2 \
          -DFETCHCONTENT_SOURCE_DIR_FUZZTEST=fuzztest \
          . -B build
        ASAN_OPTIONS=detect_container_overflow=0 cmake --build build

  build_mxe:
    name: MXE (TBB:${{matrix.parallelization == 'ON'}})
    timeout-minutes: 30
    strategy:
      matrix:
        parallelization: [OFF, ON]
    runs-on: ubuntu-latest
    container: openscad/mxe-x86_64-gui:latest
    steps:
    - uses: actions/checkout@v6
    - *clone-clipper2
    - name: Build
      run: |
        export MXEDIR=/mxe
        export MXE_TARGETS=x86_64-w64-mingw32.static.posix
        export MXEDIR=$HOME/openscad_deps/mxe
        export MXETARGETDIR=$MXEDIR/usr/$MXE_TARGETS
        export PATH=/mxe/usr/bin:$PATH
        export CMAKE=$MXE_TARGETS-cmake
        $CMAKE \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DMANIFOLD_STRICT=ON \
          -DMANIFOLD_PYBIND=OFF \
          -DMANIFOLD_CBIND=ON \
          -DMANIFOLD_DEBUG=ON \
          -DMANIFOLD_PAR=${{matrix.parallelization}} \
          -DFETCHCONTENT_SOURCE_DIR_CLIPPER2=clipper2 \
          . -B build
        $CMAKE --build build

  build_mac:
    name: MacOS (TBB:${{matrix.parallelization == 'ON'}}, shared lib:${{matrix.shared == 'ON'}}, ${{matrix.os}})
    timeout-minutes: 30
    strategy:
      matrix:
        parallelization: [OFF, ON]
        shared: [OFF, ON]
        # macos-15-intel: intel
        # macos-latest: arm
        os: [macos-15-intel, macos-latest]
    runs-on: ${{matrix.os}}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'
    - name: Install common dependencies
      run: |
        brew install googletest assimp cmake
        pip install trimesh pytest
    - name: Install TBB
      if: matrix.parallelization == 'ON'
      run: brew install tbb
    - *clone-clipper2
    - name: Build
      run: |
        cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=${{matrix.shared}} \
          -DMANIFOLD_STRICT=ON \
          -DMANIFOLD_DEBUG=ON \
          -DMANIFOLD_ASSERT=ON \
          -DMANIFOLD_PYBIND=ON \
          -DASSIMP_ENABLE=ON \
          -DMANIFOLD_PAR=${{matrix.parallelization}} \
          -DFETCHCONTENT_SOURCE_DIR_CLIPPER2=clipper2 \
          . -B build
        cmake --build build
    - name: Test
      run: |
        build/test/manifold_test
    - name: Export determinism meshes
      if: matrix.parallelization == 'OFF' && matrix.shared == 'OFF' && matrix.os == 'macos-latest'
      env:
        MANIFOLD_OBJ_HEX_FLOAT: 1
      run: |
        build/test/manifold_test -e --gtest_filter=Boolean.DeterminismSimpleSubtract:Boolean.DeterminismSimpleUnion:Boolean.DeterminismSimpleIntersect:Boolean.MultiCoplanar:Boolean.NonIntersecting:Boolean.AlmostCoplanar
        mkdir -p meshes-mac
        cp det_simple_subtract.obj det_simple_union.obj det_simple_intersect.obj det_multi_coplanar.obj det_non_overlap.obj det_nearly_coplanar.obj meshes-mac/
    - name: Upload determinism meshes (macOS)
      if: matrix.parallelization == 'OFF' && matrix.shared == 'OFF' && matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: meshes-mac
        path: meshes-mac/
    - name: Export determinism discovery meshes (macOS)
      if: matrix.parallelization == 'OFF' && matrix.shared == 'OFF' && matrix.os == 'macos-latest'
      env:
        MANIFOLD_OBJ_HEX_FLOAT: 1
        MANIFOLD_BOOLEAN_DEBUG_DUMP: 1
        MANIFOLD_BOOLEAN_DEBUG_DUMP_DIR: boolean-dumps-perturb3-mac
      run: |
        build/test/manifold_test -e --gtest_filter=Boolean.Perturb3
        mkdir -p meshes-perturb3-mac
        cp perturb3_pair_union.obj perturb3_pair01.obj perturb3_pair23.obj perturb3_gear3_seq.obj perturb3_gear3_batch.obj perturb3_gear4_seq.obj perturb3_gear4_batch.obj perturb3_gear4_balanced_seq.obj perturb3_gear.obj perturb3_outerGear.obj perturb3_nastyGear.obj meshes-perturb3-mac/
    - name: Upload determinism discovery meshes (macOS)
      if: matrix.parallelization == 'OFF' && matrix.shared == 'OFF' && matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: meshes-perturb3-mac
        path: meshes-perturb3-mac/
    - name: Upload determinism discovery debug dumps (macOS)
      if: matrix.parallelization == 'OFF' && matrix.shared == 'OFF' && matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: boolean-dumps-perturb3-mac
        path: boolean-dumps-perturb3-mac/
    - name: test cmake consumer
      run: |
        sudo cmake --install build
        ./scripts/test-cmake.sh
    - name: test pkg-config consumer
      if: matrix.shared == 'ON'
      run: |
        LDFLAGS=-Wl,-rpath,/usr/local/lib ./scripts/test-pkgconfig.sh

  build_mac_builtin_tbb:
    timeout-minutes: 30
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'
    - name: Install common dependencies
      run: |
        brew install googletest cmake
        pip install trimesh pytest
    - *clone-tbb
    - *clone-clipper2
    - name: test cmake consumer subdir
      run: |
        export CLIPPER2=$(pwd)/clipper2
        export TBB=$(pwd)/tbb
        cd ..
        ./manifold/scripts/test-cmake-subdir.sh
    - name: Build
      run: |
        cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=ON \
          -DMANIFOLD_STRICT=ON \
          -DMANIFOLD_USE_BUILTIN_TBB=ON \
          -DMANIFOLD_DEBUG=ON \
          -DMANIFOLD_ASSERT=ON \
          -DMANIFOLD_PYBIND=OFF \
          -DMANIFOLD_PAR=ON \
          -DFETCHCONTENT_SOURCE_DIR_TBB=tbb \
          -DFETCHCONTENT_SOURCE_DIR_CLIPPER2=clipper2 \
          . -B build
        cmake --build build
    - name: Test
      run: |
        ./build/test/manifold_test
    - name: test cmake consumer
      run: |
        sudo cmake --install build
        ./scripts/test-cmake.sh
        LDFLAGS=-Wl,-rpath,/usr/local/lib ./scripts/test-pkgconfig.sh

  build_nix:
    timeout-minutes: 30
    strategy:
      matrix:
        variant: [manifold-none, manifold-tbb, manifold-js, manifold-js-tbb, manifold3d]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: DeterminateSystems/nix-installer-action@main
    - uses: DeterminateSystems/magic-nix-cache-action@main
    - run: nix build -L '.?submodules=1#${{matrix.variant}}'

  determinism_check:
    name: Cross-platform determinism check
    needs: [build, build_windows, build_mac]
    runs-on: ubuntu-latest
    steps:
    - name: Download Linux meshes
      uses: actions/download-artifact@v4
      with:
        name: meshes-linux
        path: meshes/linux
    - name: Download macOS meshes
      uses: actions/download-artifact@v4
      with:
        name: meshes-mac
        path: meshes/mac
    - name: Download Windows meshes
      uses: actions/download-artifact@v4
      with:
        name: meshes-windows
        path: meshes/windows
    - name: Compare meshes across platforms
      run: |
        set -euo pipefail
        failed=0
        normalized_dir="$(mktemp -d)"
        for f in det_simple_subtract.obj det_simple_union.obj det_simple_intersect.obj det_multi_coplanar.obj det_non_overlap.obj det_nearly_coplanar.obj; do
          echo "--- $f ---"
          file_missing=0
          for os in linux mac windows; do
            if [ ! -f "meshes/$os/$f" ]; then
              echo "Missing file: meshes/$os/$f"
              failed=1
              file_missing=1
            fi
          done
          if [ "$file_missing" -ne 0 ]; then
            continue
          fi
          for os in linux mac windows; do
            tr -d '\r' < "meshes/$os/$f" > "$normalized_dir/$os-$f"
          done
          linux_hash=$(sha256sum "$normalized_dir/linux-$f" | awk '{print $1}')
          mac_hash=$(sha256sum "$normalized_dir/mac-$f" | awk '{print $1}')
          win_hash=$(sha256sum "$normalized_dir/windows-$f" | awk '{print $1}')
          echo "linux:   $linux_hash"
          echo "mac:     $mac_hash"
          echo "windows: $win_hash"
          if [ "$linux_hash" != "$mac_hash" ] || [ "$linux_hash" != "$win_hash" ]; then
            echo "MISMATCH in $f"
            echo "linux vs mac diff:"
            diff "$normalized_dir/linux-$f" "$normalized_dir/mac-$f" | sed -n '1,200p' || true
            echo "linux vs windows diff:"
            diff "$normalized_dir/linux-$f" "$normalized_dir/windows-$f" | sed -n '1,200p' || true
            failed=1
          fi
        done
        exit $failed

  determinism_discovery:
    name: Cross-platform determinism discovery (non-blocking)
    needs: [build, build_windows, build_mac]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Download Linux discovery meshes
      uses: actions/download-artifact@v4
      with:
        name: meshes-perturb3-linux
        path: meshes/linux
    - name: Download macOS discovery meshes
      uses: actions/download-artifact@v4
      with:
        name: meshes-perturb3-mac
        path: meshes/mac
    - name: Download Windows discovery meshes
      uses: actions/download-artifact@v4
      with:
        name: meshes-perturb3-windows
        path: meshes/windows
    - name: Download Linux discovery debug dumps
      uses: actions/download-artifact@v4
      with:
        name: boolean-dumps-perturb3-linux
        path: boolean-dumps/linux
    - name: Download macOS discovery debug dumps
      uses: actions/download-artifact@v4
      with:
        name: boolean-dumps-perturb3-mac
        path: boolean-dumps/mac
    - name: Download Windows discovery debug dumps
      uses: actions/download-artifact@v4
      with:
        name: boolean-dumps-perturb3-windows
        path: boolean-dumps/windows
    - name: Compare discovery meshes across platforms
      run: |
        set -euo pipefail
        failed=0
        mismatches=""
        normalized_dir="$(mktemp -d)"
        for f in perturb3_pair_union.obj perturb3_pair01.obj perturb3_pair23.obj perturb3_gear3_seq.obj perturb3_gear3_batch.obj perturb3_gear4_seq.obj perturb3_gear4_batch.obj perturb3_gear4_balanced_seq.obj perturb3_gear.obj perturb3_outerGear.obj perturb3_nastyGear.obj; do
          echo "--- $f ---"
          file_missing=0
          for os in linux mac windows; do
            if [ ! -f "meshes/$os/$f" ]; then
              echo "Missing file: meshes/$os/$f"
              failed=1
              file_missing=1
            fi
          done
          if [ "$file_missing" -ne 0 ]; then
            mismatches="$mismatches $f(missing)"
            continue
          fi
          for os in linux mac windows; do
            tr -d '\r' < "meshes/$os/$f" > "$normalized_dir/$os-$f"
          done
          linux_hash=$(sha256sum "$normalized_dir/linux-$f" | awk '{print $1}')
          mac_hash=$(sha256sum "$normalized_dir/mac-$f" | awk '{print $1}')
          win_hash=$(sha256sum "$normalized_dir/windows-$f" | awk '{print $1}')
          echo "linux:   $linux_hash"
          echo "mac:     $mac_hash"
          echo "windows: $win_hash"
          if [ "$linux_hash" != "$mac_hash" ] || [ "$linux_hash" != "$win_hash" ]; then
            echo "MISMATCH in $f"
            echo "linux vs mac diff:"
            diff "$normalized_dir/linux-$f" "$normalized_dir/mac-$f" | sed -n '1,200p' || true
            echo "linux vs windows diff:"
            diff "$normalized_dir/linux-$f" "$normalized_dir/windows-$f" | sed -n '1,200p' || true
            failed=1
            mismatches="$mismatches $f"
          fi
        done

        if [ "$failed" -ne 0 ]; then
          echo "::warning::Determinism discovery found cross-platform mismatches:$mismatches"
          {
            echo "### Determinism discovery mismatches"
            echo ""
            echo "$mismatches"
          } >> "$GITHUB_STEP_SUMMARY"
        else
          {
            echo "### Determinism discovery"
            echo ""
            echo "No cross-platform mismatches detected for the current Perturb3 decomposition set."
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        # Discovery lane is intentionally non-blocking.
        exit 0
    - name: Compare discovery boolean debug dumps
      run: |
        bash ./scripts/compare_boolean_dumps.sh boolean-dumps
    - name: Upload discovery debug dumps bundle
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: boolean-dumps-perturb3
        path: |
          boolean-dumps/linux/
          boolean-dumps/mac/
          boolean-dumps/windows/
