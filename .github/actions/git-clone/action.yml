name: download and cache git repo
description: this simply dumps it in the current directory...
inputs:
  name:
    required: true
  url:
    required: true
  rev:
    required: true

runs:
  using: "composite"
  steps:
    - name: setup cache
      id: cache
      uses: actions/cache@v5
      with:
        path: ${{inputs.name}}
        key: ${{inputs.url}}@${{inputs.rev}}

    - name: download
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir ${{inputs.name}}
        cd ${{inputs.name}}
        git init
        git remote add origin ${{inputs.url}}
        git fetch --depth 1 origin ${{inputs.rev}}
        git checkout ${{inputs.rev}}
        git submodule update --init --recursive
